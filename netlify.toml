[build]
  command = "pip install -r requirements.txt && mkdir -p .streamlit && echo '[server]\\nheadless = true\\nport = 8888\\nenableCORS = false' > .streamlit/config.toml"
  publish = "."

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
